name: Build & Release ARM64 DEB

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # full history needed to find latest tag

      - name: Initialize submodules (fallback)
        run: |
          if [ ! -f deps/singleapplication/CMakeLists.txt ]; then
            echo "SingleApplication submodule missing, cloning manually..."
            rm -rf deps/singleapplication
            git clone https://github.com/itay-grudev/SingleApplication deps/singleapplication
          fi
          if [ ! -f deps/libmpv/include/mpv/client.h ]; then
            echo "libmpv headers missing, cloning manually..."
            rm -rf deps/libmpv
            git clone https://github.com/Ivshti/libmpv deps/libmpv
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkgconf librsvg2-bin wget \
            libssl-dev \
            qtbase5-dev qtdeclarative5-dev qtwebengine5-dev \
            libqt5webchannel5-dev libqt5dbus5 libqt5opengl5-dev \
            qml-module-qtwebchannel qml-module-qtwebengine \
            qml-module-qt-labs-platform qml-module-qtquick-dialogs \
            qml-module-qtquick-controls qml-module-qt-labs-settings \
            qml-module-qt-labs-folderlistmodel \
            libmpv-dev nodejs npm

      - name: Install addon dependencies
        run: cd "DualSubtitles AddOn" && npm install --production

      - name: Compute next version
        id: version
        run: |
          # Base version from CMakeLists.txt (e.g. 4.4.181)
          BASE=$(sed -E '/^project\(/!d;s/^.*VERSION "([^"]+)".*$/\1/g' CMakeLists.txt)
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)

          # Find the latest tag matching vMAJOR.MINOR.* and increment patch
          LATEST_TAG=$(git tag -l "v${MAJOR}.${MINOR}.*" --sort=-v:refname | head -n1)
          if [ -n "$LATEST_TAG" ]; then
            LAST_PATCH=$(echo "$LATEST_TAG" | sed "s/v${MAJOR}\.${MINOR}\.\(.*\)/\1/")
            NEXT_PATCH=$((LAST_PATCH + 1))
          else
            NEXT_PATCH=$(echo "$BASE" | cut -d. -f3)
          fi

          VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next release: v${VERSION}"

      - name: Build and package .deb
        run: |
          chmod +x scripts/build-deb.sh scripts/stremio-launcher.sh
          bash scripts/build-deb.sh --compile

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stremio-${{ steps.version.outputs.version }}-arm64-deb
          path: "*.deb"
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Stremio v${{ steps.version.outputs.version }} for Raspberry Pi 5
          body: |
            ## Stremio v${{ steps.version.outputs.version }} — ARM64 (Raspberry Pi 5)

            ### Installation
            ```bash
            sudo apt install ./stremio_${{ steps.version.outputs.version }}_arm64.deb
            ```

            ### What's included
            - Stremio shell (Qt5/WebEngine UI) compiled natively for ARM64
            - Node.js streaming server (server.js)
            - DualSubtitles addon (dual subtitle support with independent styling)
            - Launcher script with automatic server management
            - Desktop integration (icons, MIME types, .desktop file)

            ### Requirements
            - Raspberry Pi 5 (8GB recommended) or any ARM64 board
            - Ubuntu 24.04+ / Debian Bookworm+ (arm64)
            - All runtime dependencies are installed automatically via apt

            ### Hardware decoding
            This build enables V4L2 M2M hardware decoding by default for smooth video playback.
          files: "*.deb"
          draft: false
          prerelease: false
